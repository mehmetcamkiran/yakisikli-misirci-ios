name: iOS Build and Upload
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
        
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project YakisikliMisirci/YakisikliMisirci.xcodeproj \
            -scheme YakisikliMisirci \
            -archivePath YakisikliMisirci.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
